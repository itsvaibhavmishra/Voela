name: Release

# Cuts a GitHub Release when a new version lands on main.
# The version is read from /version.properties (the single source of truth) — bump
# VERSION_NAME/VERSION_CODE there and merge to main to publish. A release is only
# created when the tag v<VERSION_NAME> does not already exist, so ordinary merges
# that don't change the version won't produce duplicate releases. Can also be run
# manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          VERSION_NAME=$(grep '^VERSION_NAME=' version.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${{ steps.ver.outputs.tag }} already exists — skipping release. Bump version.properties to cut a new one."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.tag.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.tag.outputs.exists == 'false'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform 36, build-tools, NDK)
        if: steps.tag.outputs.exists == 'false'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Decode release keystore (if configured)
        if: steps.tag.outputs.exists == 'false' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        if: steps.tag.outputs.exists == 'false'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Name the APK
        if: steps.tag.outputs.exists == 'false'
        run: cp app/build/outputs/apk/release/app-release.apk "Voela-${{ steps.ver.outputs.name }}.apk"

      - name: Publish GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Voela ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: Voela-${{ steps.ver.outputs.name }}.apk
