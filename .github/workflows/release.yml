name: Build & Release

# Builds the release APK and, depending on the trigger:
#  - push to staging: a sandbox that exercises the full build + publish path and updates a
#    rolling "staging" pre-release. This is the pre-merge gate — merge staging -> main only
#    once this build is green, so failures surface BEFORE main.
#  - push to main: publishes a real GitHub Release tagged v<VERSION_NAME> (from
#    version.properties), but only when that tag doesn't already exist, so ordinary merges
#    that don't bump the version won't create duplicate releases.
# Version is the single source of truth in /version.properties.

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

# One in-flight run per branch: a newer push/merge cancels the older run so builds
# never pile up or race on the rolling staging pre-release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version & channel
        id: cfg
        run: |
          VN=$(grep '^VERSION_NAME=' version.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "name=$VN" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "title=Voela $VN" >> "$GITHUB_OUTPUT"
            if git ls-remote --tags origin "refs/tags/v$VN" | grep -q .; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::v$VN already released — bump version.properties to cut a new one."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "title=Voela $VN (staging sandbox)" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.cfg.outputs.skip == 'false'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform 36, build-tools, NDK)
        if: steps.cfg.outputs.skip == 'false'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Decode release keystore (only if secret configured)
        if: steps.cfg.outputs.skip == 'false' && env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        if: steps.cfg.outputs.skip == 'false'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && format('{0}/release.jks', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "Voela-${{ steps.cfg.outputs.name }}.apk"

      - name: Upload APK artifact
        if: steps.cfg.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: Voela-${{ steps.cfg.outputs.name }}-${{ github.run_id }}
          path: Voela-${{ steps.cfg.outputs.name }}.apk

      - name: Publish staging sandbox pre-release
        if: steps.cfg.outputs.skip == 'false' && github.ref_name == 'staging'
        run: |
          gh release delete staging --yes --cleanup-tag 2>/dev/null || true
          gh release create staging "Voela-${{ steps.cfg.outputs.name }}.apk" \
            --prerelease --target "${{ github.sha }}" \
            --title "${{ steps.cfg.outputs.title }}" \
            --notes "Sandbox build from staging — verifies the release pipeline. Not a stable release."

      - name: Publish release
        if: steps.cfg.outputs.skip == 'false' && github.ref_name == 'main'
        run: |
          gh release create "v${{ steps.cfg.outputs.name }}" "Voela-${{ steps.cfg.outputs.name }}.apk" \
            --title "${{ steps.cfg.outputs.title }}" --generate-notes
